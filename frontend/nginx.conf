server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI container on the compose network.
    # Use Docker's embedded DNS (127.0.0.11) + a variable upstream so nginx
    # re-resolves `api` and survives api container restarts (avoids stale-IP 502s).
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream api;
        proxy_pass http://$api_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
